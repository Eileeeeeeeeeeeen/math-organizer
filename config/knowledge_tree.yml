# 考研数学知识体系枚举树
# =========================
# 基于考研数学通用大纲体系
# 共三大科目、36 讲
# LLM 只能从此树的叶子节点中选择知识点进行标注。

高等数学:
  第1讲_函数极限与连续:
    - 函数概念与性质（有界性、单调性、奇偶性、周期性）
    - 数列极限的定义（ε-N语言）
    - 函数极限的定义与性质（ε-δ语言）
    - 无穷小量与无穷大量
    - 极限的四则运算法则
    - 极限存在的准则（夹逼准则、单调有界准则）
    - 两个重要极限
    - 无穷小的比较（等价无穷小替换）
    - 函数的连续性（左连续、右连续）
    - 间断点的类型与判定
    - 连续函数的运算与初等函数的连续性
    - 闭区间上连续函数的性质（有界性、最值定理、介值定理、零点定理）
    - 一致连续性

  第2讲_数列极限:
    - 数列极限的收敛性判定
    - 递推数列的极限
    - 初值对数列敛散性的影响
    - 数列极限的计算方法
    - 数列极限的证明题
    - 斯笃兹定理

  第3讲_导数与微分:
    - 导数的定义与几何意义
    - 单侧导数
    - 函数的可导性与连续性关系
    - 基本求导公式与求导法则
    - 复合函数求导（链式法则）
    - 隐函数求导
    - 参数方程确定的函数求导
    - 高阶导数
    - 莱布尼茨公式
    - 函数的微分
    - 微分的几何意义与应用

  第4讲_微分中值定理:
    - 费马引理
    - 罗尔定理
    - 拉格朗日中值定理
    - 柯西中值定理
    - 泰勒公式（泰勒展开）
    - 佩亚诺余项与拉格朗日余项
    - 常用函数的泰勒展开式
    - 中值定理的证明题

  第5讲_导数的应用:
    - 洛必达法则
    - 函数的单调性与极值
    - 函数的最值问题
    - 曲线的凹凸性与拐点
    - 渐近线
    - 函数作图
    - 曲率与曲率半径
    - 方程的近似解

  第6讲_不定积分:
    - 原函数与不定积分的概念
    - 基本积分公式
    - 第一类换元法（凑微分法）
    - 第二类换元法（三角代换、根式代换）
    - 分部积分法
    - 有理函数的积分
    - 三角函数的积分
    - 无理函数的积分

  第7讲_定积分:
    - 定积分的定义与几何意义
    - 定积分的性质
    - 微积分基本定理（牛顿-莱布尼茨公式）
    - 定积分的换元法
    - 定积分的分部积分法
    - 广义积分（反常积分）
    - 积分上限函数及其求导
    - 定积分的应用

  第8讲_定积分的应用:
    - 平面图形的面积
    - 旋转体的体积
    - 已知截面面积的立体体积
    - 弧长
    - 旋转曲面的面积
    - 定积分在物理中的应用（功、压力、质心）

  第9讲_微分方程:
    - 微分方程的基本概念
    - 可分离变量的微分方程
    - 齐次方程
    - 一阶线性微分方程
    - 伯努利方程
    - 可降阶的高阶微分方程
    - 高阶线性微分方程解的结构
    - 常系数齐次线性微分方程
    - 常系数非齐次线性微分方程
    - 欧拉方程
    - 微分方程的应用

  第10讲_多元函数微分:
    - 多元函数的基本概念
    - 偏导数
    - 全微分
    - 多元复合函数求导
    - 隐函数求导
    - 方向导数与梯度
    - 多元函数的极值
    - 条件极值与拉格朗日乘数法

  第11讲_二重积分:
    - 二重积分的概念与性质
    - 直角坐标系下二重积分的计算
    - 极坐标系下二重积分的计算
    - 二重积分的换元
    - 二重积分的应用（面积、体积、质心）

  第12讲_三重积分:
    - 三重积分的概念与性质
    - 直角坐标系下三重积分的计算
    - 柱坐标系下三重积分的计算
    - 球坐标系下三重积分的计算
    - 三重积分的应用

  第13讲_曲线积分:
    - 第一类曲线积分（对弧长的曲线积分）
    - 第二类曲线积分（对坐标的曲线积分）
    - 格林公式
    - 曲线积分与路径无关的条件
    - 全微分的原函数

  第14讲_曲面积分:
    - 第一类曲面积分（对面积的曲面积分）
    - 第二类曲面积分（对坐标的曲面积分）
    - 高斯公式
    - 斯托克斯公式
    - 散度与旋度

  第15讲_无穷级数:
    - 常数项级数的概念与性质
    - 常数项级数的审敛法
    - 幂级数
    - 函数展开成幂级数
    - 傅里叶级数
    - 正弦级数与余弦级数
    - 周期函数的傅里叶展开

  第16讲_向量代数与空间解析几何:
    - 向量的基本概念与运算
    - 数量积与向量积
    - 平面方程
    - 空间直线方程
    - 曲面方程
    - 空间曲线方程

  第17讲_重积分的应用:
    - 曲面的面积
    - 质心与形心
    - 转动惯量
    - 引力

  第18讲_综合提高:
    - 极限综合题
    - 积分综合题
    - 级数综合题
    - 证明综合题

线性代数:
  第1讲_行列式:
    - 行列式的定义
