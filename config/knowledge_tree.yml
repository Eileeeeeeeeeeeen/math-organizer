    - 可逆矩阵与逆矩阵
    - 伴随矩阵
    - 分块矩阵
    - 矩阵的秩

  第3讲_向量组与线性方程组:
    - 线性方程组的消元法
    - 向量组的线性相关性
    - 向量组的秩
    - 线性方程组解的结构
    - 齐次线性方程组的基础解系
    - 非齐次线性方程组的通解

  第4讲_特征值与特征向量:
