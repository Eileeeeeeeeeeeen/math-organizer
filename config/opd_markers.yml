# 解题方法论（OPD）记号体系
# ================================
# OPD = Objective / Procedure / Detail 三级解题标注
# LLM 只能从此枚举值中选择 O/P/D 代码进行标注。

# ── O（目标 / Objective）──
# 题目考察的核心目标
O:
  - O_极限
  - O_导数
  - O_不定积分
  - O_定积分
  - O_反常积分
  - O_微分方程
  - O_多元微分
  - O_二重积分
  - O_三重积分
  - O_曲线积分
  - O_曲面积分
  - O_无穷级数
  - O_空间解析几何
  - O_行列式
  - O_矩阵
  - O_向量组与线性方程组
  - O_特征值与特征向量
  - O_二次型
  - O_随机事件与概率
  - O_随机变量与分布
  - O_多维随机变量
  - O_数字特征
  - O_大数定律与中心极限定理
  - O_参数估计
  - O_假设检验
  - O_中值定理
  - O_不等式证明
  - O_数列极限
  - O_函数极限
  - O_连续与间断

# ── P（思路 / Procedure）──
# 解题的思维路径
P:
  - P11_正向思路          # 直接从条件推导结论
  - P12_逆向思路          # 从结论反推条件
  - P2_反证思路           # 假设结论不成立，导出矛盾
  - P3_数学归纳           # 数学归纳法证明
  - P4_构造思路           # 构造辅助函数/辅助量
  - P5_数形结合           # 利用几何直观推导
  - P6_分类讨论           # 对不同情形分别讨论
  - P7_化归转化           # 将问题转化为已知问题
  - P8_变量代换           # 换元法
  - P9_对称性利用          # 利用对称性简化
  - P10_夹逼准则           # 夹逼定理

# ── D（细节 / Detail）──
# 解题过程中运用的具体技巧
D:
  - D21_观察研究对象       # 仔细审题、观察题目特征
  - D22_转换等价表述       # 等价转化（如极限的等价无穷小）
  - D23_联想相关结论       # 回想相关定理/公式
  - D24_尝试特殊值/特例    # 代入特值检验
  - D31_分拆与重组         # 分拆表达式重组
  - D32_提出公共因子       # 提取公因子
  - D33_配方与完成平方     # 配方法
  - D34_引入参数           # 引入辅助参数
  - D41_利用已知结论       # 直接应用定理/推论
  - D42_利用对称性         # 利用函数/图形的对称性
  - D43_数形结合           # 画图辅助分析
  - D44_利用单调性         # 利用函数单调性
  - D45_利用周期性         # 利用函数周期性
  - D51_取对数             # 对数化处理
  - D52_取极限             # 取极限处理
  - D53_逐项处理           # 级数逐项判断
